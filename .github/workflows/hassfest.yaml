name: Validate with hassfest

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *"

jobs:
  validate:
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@v4.2.2"
      - uses: "home-assistant/actions/hassfest@master"  # <--- Mantieni master se preferisci l'automatismo oppure:"home-assistant/actions/hassfest@v1.4.0"
