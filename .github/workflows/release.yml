name: Build Release Asset

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Update manifest version
        run: |
          jq --arg version "${{ github.event.release.tag_name }}" \
             '.version = ($version | ltrimstr("v"))' \
             custom_components/digital_pendulum/manifest.json > tmp.json
          mv tmp.json custom_components/digital_pendulum/manifest.json

      - name: Commit updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/digital_pendulum/manifest.json
          git diff --staged --quiet || git commit -m "chore: bump manifest version to ${{ github.event.release.tag_name }}"
          git push origin HEAD:main

      # --- NUOVO: sposta il tag esistente sul commit appena pushato ---
      # Il tag creato da "release published" punta ancora al vecchio commit.
      # Lo ricreiamo forzatamente sull'ultimo commit di main (quello col manifest aggiornato)
      # e lo ripubblichiamo, cosi' che "Source code (zip)" di GitHub rifletta la versione corretta.
      - name: Move tag to updated commit
        run: |
          git tag -f "${{ github.event.release.tag_name }}" HEAD
          git push origin "${{ github.event.release.tag_name }}" --force

      - name: Create ZIP
        run: zip -r digital_pendulum.zip . -x "*.git*"

      - name: Upload asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: digital_pendulum.zip
